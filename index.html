<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>広報ニュースフィード</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f7f8fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.55rem;
        line-height: 1.35;
      }

      p {
        margin: 0 0 18px;
        color: #697386;
        line-height: 1.7;
      }

      .links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      a {
        display: block;
        border: 1px solid #d9dde3;
        border-radius: 8px;
        background: #ffffff;
        color: #2563eb;
        font-weight: 700;
        padding: 16px;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid #93c5fd;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>広報ニュースフィード</h1>
      <p>SharePoint埋め込み用ページを選択してください。</p>
      <div class="links">
        <a href="./compact/">compact版を開く</a>
        <a href="./list/">list版を開く</a>
      </div>
    </main>
  </body>
</html>
